name: digital_wallet
description: FinTech Digital Wallet App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.5
  bloc: ^8.1.4
  equatable: ^2.0.5

  # Networking
  dio: ^5.4.3
  pretty_dio_logger: ^1.3.1

  # Secure Storage
  flutter_secure_storage: ^9.0.0

  # Dependency Injection
  get_it: ^7.7.0
  injectable: ^2.4.1

  # Navigation
  go_router: ^13.2.4

  # Utils
  dartz: ^0.10.1
  intl: ^0.19.0
  connectivity_plus: ^6.0.3

  # UI
  shimmer: ^3.0.0
  lottie: ^3.1.0
  shared_preferences: ^2.5.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  injectable_generator: ^2.6.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
